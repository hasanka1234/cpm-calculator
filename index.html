<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid ROI | Ultimate Ad Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* === BASE & RESET === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: #020617; color: #f8fafc; min-height: 100vh; overflow-x: hidden; position: relative; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }
        
        /* === ANIMATED LIQUID BACKGROUND === */
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: #020617; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; animation: floatOrb 15s infinite alternate ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -15%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: #d946ef; bottom: -20%; right: -15%; animation-duration: 20s; animation-direction: alternate-reverse; }
        .orb-3 { width: 400px; height: 400px; background: #0ea5e9; top: 30%; left: 35%; animation-duration: 25s; }
        
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(80px, 80px) scale(1.1); } }

        /* === MAIN LIQUID GLASS CONTAINER === */
        .dashboard {
            width: 100%; max-width: 1050px; 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 50px; position: relative; z-index: 10;
            transition: all 0.4s ease;
        }

        /* === HEADER === */
        .header { text-align: center; margin-bottom: 40px; }
        .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; font-size: 0.8rem; color: #94a3b8; letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase; font-weight: 500;}
        .pulse { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #64748b; font-size: 1.1rem; }

        /* === LAYOUT GRID === */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } h1 { font-size: 2.5rem; } .dashboard { padding: 30px; } }

        /* === INPUT SECTION === */
        .input-group { margin-bottom: 22px; }
        label { display: flex; justify-content: space-between; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 8px; font-weight: 500; }
        .curr-label { color: #38bdf8; font-weight: 700; }
        input, select {
            width: 100%; padding: 18px; border-radius: 16px;
            background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff; font-size: 1.2rem; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        input:focus, select:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1), inset 0 2px 4px rgba(0,0,0,0.2); background: rgba(15, 23, 42, 0.8); transform: translateY(-2px); }
        
        /* === RESULTS SECTION === */
        .results-grid { display: flex; flex-direction: column; gap: 20px; }
        .result-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px 30px;
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .result-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .res-title { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-weight: 700; }
        .res-val { font-size: 2.5rem; font-weight: 900; color: #ffffff; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .profit-positive { color: #10b981; } 
        .profit-negative { color: #ef4444; } 
        .badge-pill { font-size: 0.9rem; font-weight: 700; padding: 6px 12px; border-radius: 10px; margin-left: 15px; vertical-align: middle; }

        /* === ACTIONS (SHARE & CSV) === */
        .actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #38bdf8, #818cf8); color: white; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(56, 189, 248, 0.5); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* === EXPLANATION SECTION === */
        .explanation {
            background: rgba(0,0,0,0.2); border-radius: 20px; padding: 25px; margin-top: 30px;
            border-left: 4px solid #818cf8; font-size: 1.05rem; line-height: 1.6; color: #cbd5e1;
        }
        .highlight { color: #fff; font-weight: 700; }
        
        /* Toast Notification */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 100; box-shadow: 0 10px 30px rgba(16,185,129,0.4); }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="dashboard">
    <div class="header">
        <div class="badge" id="geo-status"><div class="pulse"></div> Global Network</div>
        <h1>Liquid ROI</h1>
        <p class="subtitle">Enter metrics to calculate CPM, CPC, and ROAS. Auto-saves to URL for easy sharing.</p>
    </div>

    <div class="grid-container">
        <div class="inputs">
            <div class="input-group">
                <label>Currency <span class="curr-label" id="lbl-curr">USD</span></label>
                <select id="currency" onchange="changeCurrency()">
                    </select>
            </div>
            <div class="input-group">
                <label>Total Ad Spend <span class="curr-label curr-symbol"></span></label>
                <input type="number" id="spend" value="1000" oninput="runCalculations()" autofocus>
            </div>
            <div class="input-group">
                <label>Total Impressions</label>
                <input type="number" id="impressions" value="250000" oninput="runCalculations()">
            </div>
            <div class="input-group">
                <label>Total Clicks</label>
                <input type="number" id="clicks" value="5000" oninput="runCalculations()">
            </div>
            <div class="input-group">
                <label>Total Revenue <span class="curr-label curr-symbol"></span></label>
                <input type="number" id="revenue" value="4500" oninput="runCalculations()">
            </div>
        </div>

        <div class="results-grid">
            <div class="result-card">
                <div class="res-title">Cost Per 1000 Impressions (CPM)</div>
                <div class="res-val" id="display-cpm">-</div>
            </div>
            <div class="result-card">
                <div class="res-title">Cost Per Click (CPC)</div>
                <div class="res-val" id="display-cpc">-</div>
            </div>
            <div class="result-card" id="roas-card">
                <div class="res-title">Return on Ad Spend (ROAS)</div>
                <div class="res-val" id="display-roas">-</div>
            </div>
            
            <div class="actions">
                <button class="btn btn-secondary" onclick="downloadCSV()">⬇ Download CSV</button>
                <button class="btn btn-primary" onclick="shareLink()">🔗 Share Results</button>
            </div>
        </div>
    </div>

    <div class="explanation" id="explanation-box">
        Loading analysis...
    </div>
</div>

<div id="toast">Link copied to clipboard!</div>

<script>
    // Global State
    let currentCPM = 0, currentCPC = 0, currentROAS = 0, netProfit = 0;
    
    // Comprehensive Currency List (60+ World Currencies)
    const worldCurrencies = [
        "USD", "LKR", "EUR", "GBP", "INR", "AUD", "CAD", "SGD", "AED", "SAR", "QAR", "NZD", "ZAR", "JPY", "CNY", "CHF", "HKD", "SEK", "KRW", "MYR", "THB", "IDR", "PHP", "VND", "BRL", "RUB", "MXN", "TRY", "PKR", "BDT", "NPR", "KWD", "OMR", "BHD", "JOD", "EGP", "NGN", "KES", "GHS", "TZS", "UGX", "MAD", "ARS", "CLP", "COP", "PEN", "ILS", "PLN", "CZK", "HUF", "RON", "BGN", "DKK", "NOK", "ISK", "TWD", "MOP", "FJD", "XPF", "BND"
    ];

    // Initialize Dropdown
    function populateCurrencies() {
        const select = document.getElementById('currency');
        worldCurrencies.forEach(code => {
            const option = document.createElement('option');
            option.value = code; option.text = code;
            select.appendChild(option);
        });
    }

    // Advanced Formatting Function
    function formatCurrency(amount, currencyType) {
        if (!isFinite(amount) || isNaN(amount)) return "0.00";
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyType }).format(amount);
    }
    
    function formatNumber(num) {
        return new Intl.NumberFormat('en-US').format(num);
    }

    // IP Geolocation API call for Auto Currency
    async function locateUser() {
        populateCurrencies();
        const statusText = document.getElementById('geo-status');
        const urlParams = new URLSearchParams(window.location.search);
        
        // Check if URL has shared data, if so, load it
        if(urlParams.has('s')) {
            document.getElementById('spend').value = urlParams.get('s');
            document.getElementById('impressions').value = urlParams.get('i');
            document.getElementById('clicks').value = urlParams.get('cl');
            document.getElementById('revenue').value = urlParams.get('r');
            document.getElementById('currency').value = urlParams.get('c') || 'USD';
            statusText.innerHTML = `<div class="pulse" style="background:#38bdf8;box-shadow:0 0 10px #38bdf8;"></div> Shared Report Loaded`;
        } else {
            // Auto Detect via IP
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if(data.currency && worldCurrencies.includes(data.currency)) {
                    document.getElementById('currency').value = data.currency;
                    statusText.innerHTML = `<div class="pulse"></div> Live: ${data.city}, ${data.country_name}`;
                }
            } catch (e) {
                console.log("AdBlocker blocked IP detection. Defaulting to USD.");
            }
        }
        
        changeCurrency();
        // Easy input: Select text in spend box immediately
        setTimeout(() => document.getElementById('spend').select(), 100);
    }

    // When Currency Dropdown Changes
    function changeCurrency() {
        const curr = document.getElementById('currency').value;
        document.getElementById('lbl-curr').innerText = curr;
        const symbolLabels = document.querySelectorAll('.curr-symbol');
        symbolLabels.forEach(el => el.innerText = `(${curr})`);
        runCalculations();
    }

    // Main Math Logic
    function runCalculations() {
        const spend = parseFloat(document.getElementById('spend').value) || 0;
        const impressions = parseFloat(document.getElementById('impressions').value) || 0;
        const clicks = parseFloat(document.getElementById('clicks').value) || 0;
        const revenue = parseFloat(document.getElementById('revenue').value) || 0;
        const currency = document.getElementById('currency').value;

        // The Math
        currentCPM = (spend / impressions) * 1000;
        currentCPC = (spend / clicks);
        currentROAS = (spend > 0) ? (revenue / spend) * 100 : 0;
        netProfit = revenue - spend;

        // Update UI
        document.getElementById('display-cpm').innerText = isFinite(currentCPM) ? formatCurrency(currentCPM, currency) : "-";
        document.getElementById('display-cpc').innerText = isFinite(currentCPC) ? formatCurrency(currentCPC, currency) : "-";
        
        const roasValEl = document.getElementById('display-roas');
        const roasCard = document.getElementById('roas-card');
        
        if(isFinite(currentROAS)) {
            let profitClass = netProfit >= 0 ? 'profit-positive' : 'profit-negative';
            let profitBg = netProfit >= 0 ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)';
            let profitBorder = netProfit >= 0 ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)';
            let sign = netProfit >= 0 ? '+' : '';
            
            roasValEl.innerHTML = `${currentROAS.toFixed(0)}% <span class="badge-pill" style="background:${profitBg}; color:${netProfit >= 0 ? '#10b981' : '#ef4444'}">${sign}${formatCurrency(netProfit, currency)} Profit</span>`;
            roasCard.style.borderColor = profitBorder;
        } else {
            roasValEl.innerText = "-";
        }
        
        // Update Explanation Text
        updateExplanation(spend, impressions, clicks, revenue, currency);
    }
    
    // Generates the human-readable explanation
    function updateExplanation(s, i, c, r, curr) {
        const box = document.getElementById('explanation-box');
        if(s === 0 || i === 0) { box.innerHTML = "Enter your campaign numbers above to see the analysis."; return; }
        
        let text = `Your campaign reached <span class="highlight">${formatNumber(i)}</span> people at a total cost of <span class="highlight">${formatCurrency(s, curr)}</span>. `;
        text += `This means you paid <span class="highlight">${formatCurrency(currentCPM, curr)} for every 1,000 times</span> your ad was shown (CPM).<br><br>`;
        
        if(c > 0) {
            let ctr = ((c/i)*100).toFixed(2);
            text += `Out of those people, <span class="highlight">${formatNumber(c)}</span> clicked your ad (a ${ctr}% Click-Through Rate), costing you <span class="highlight">${formatCurrency(currentCPC, curr)} per click</span> (CPC). `;
        }
        
        if(r > 0) {
            let outcomeText = netProfit >= 0 ? 'made a profit of' : 'took a loss of';
            text += `Overall, you generated <span class="highlight">${formatCurrency(r, curr)}</span> in revenue. `;
            text += `Because you spent ${formatCurrency(s, curr)}, you ${outcomeText} <span class="highlight">${formatCurrency(Math.abs(netProfit), curr)}</span>. `;
            text += `Your ROAS is ${currentROAS.toFixed(0)}%, meaning for every ${formatCurrency(1, curr)} you spent, you got ${formatCurrency(r/s, curr)} back.`;
        }
        
        box.innerHTML = text;
    }

    // Share Button Logic (Generates URL with parameters)
    function shareLink() {
        const url = new URL(window.location.origin + window.location.pathname);
        url.searchParams.set('c', document.getElementById('currency').value);
        url.searchParams.set('s', document.getElementById('spend').value);
        url.searchParams.set('i', document.getElementById('impressions').value);
        url.searchParams.set('cl', document.getElementById('clicks').value);
        url.searchParams.set('r', document.getElementById('revenue').value);
        
        navigator.clipboard.writeText(url.href).then(() => {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        });
    }

    // CSV Download Logic
    function downloadCSV() {
        const curr = document.getElementById('currency').value;
        const data = [
            ["Metric", "Value"],
            ["Currency", curr],
            ["Total Ad Spend", document.getElementById('spend').value],
            ["Total Impressions", document.getElementById('impressions').value],
            ["Total Clicks", document.getElementById('clicks').value],
            ["Total Revenue", document.getElementById('revenue').value],
            ["CPM", currentCPM.toFixed(2)],
            ["CPC", currentCPC.toFixed(2)],
            ["ROAS (%)", currentROAS.toFixed(2)],
            ["Net Profit", netProfit.toFixed(2)]
        ];
        
        let csvContent = "data:text/csv;charset=utf-8," + data.map(e => e.join(",")).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Campaign_Report_${curr}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Run on startup
    window.onload = locateUser;
</script>

</body>
</html>
