<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Ad Calculator | Pro Marketers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* General Setup */
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #ffffff; overflow-x: hidden; }
        
        /* Animated Gradient Background */
        .bg-animation {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #3b0764, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        /* Hero Section (Video Placeholder) */
        .hero { text-align: center; padding: 60px 20px 40px; position: relative; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin: 0; background: -webkit-linear-gradient(#38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px;}
        .hero p { color: #94a3b8; font-size: 1.1rem; max-width: 600px; margin: 10px auto; }

        /* Glassmorphism Calculator Container */
        .calc-container {
            max-width: 900px; margin: 0 auto 50px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-wrap: wrap; gap: 40px;
            transition: transform 0.3s ease;
        }
        .calc-container:hover { transform: translateY(-5px); }

        /* Input Section */
        .inputs-col, .results-col { flex: 1; min-width: 300px; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 0.85rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
        .input-group input, .input-group select {
            width: 100%; padding: 15px; border-radius: 12px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; font-size: 1.1rem; font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease; box-sizing: border-box; outline: none;
        }
        .input-group input:focus, .input-group select:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        /* Results Section */
        .result-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
        }
        .result-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .result-card:hover::before { left: 100%; }
        .result-title { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .result-value { font-size: 2.2rem; font-weight: 800; color: #fff; margin-top: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .highlight-text { color: #34d399; } /* Green for profit/good numbers */

        .status-badge { display: inline-block; padding: 5px 12px; background: rgba(56, 189, 248, 0.2); color: #38bdf8; border-radius: 20px; font-size: 0.75rem; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<div class="hero">
    <div class="status-badge" id="geo-status">Detecting Location...</div>
    <h1>Campaign Pro</h1>
    <p>Analyze your ad performance with precision. Enter your metrics below to calculate CPM, CPC, and ROAS in real-time.</p>
</div>

<div class="calc-container">
    <div class="inputs-col">
        <div class="input-group">
            <label>Currency</label>
            <select id="currency" onchange="calculate()">
                <option value="USD">USD ($)</option>
                <option value="LKR">LKR (Rs)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Total Ad Spend</label>
            <input type="number" id="spend" value="1000" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Total Impressions</label>
            <input type="number" id="impressions" value="250000" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Total Clicks</label>
            <input type="number" id="clicks" value="5000" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Total Revenue</label>
            <input type="number" id="revenue" value="4500" oninput="calculate()">
        </div>
    </div>

    <div class="results-col">
        <div class="result-card">
            <div class="result-title">Cost Per 1000 Impressions (CPM)</div>
            <div class="result-value" id="res-cpm">-</div>
        </div>
        <div class="result-card">
            <div class="result-title">Cost Per Click (CPC)</div>
            <div class="result-value" id="res-cpc">-</div>
        </div>
        <div class="result-card">
            <div class="result-title">Return on Ad Spend (ROAS)</div>
            <div class="result-value highlight-text" id="res-roas">-</div>
        </div>
    </div>
</div>

<script>
    async function autoDetectCurrency() {
        document.getElementById('geo-status').innerText = "Connecting to Satellite...";
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            if(data.currency) {
                const currencySelect = document.getElementById('currency');
                for(let i=0; i < currencySelect.options.length; i++) {
                    if(currencySelect.options[i].value === data.currency) {
                        currencySelect.selectedIndex = i; break;
                    }
                }
                document.getElementById('geo-status').innerText = `Localized for: ${data.country_name}`;
            }
        } catch (error) {
            document.getElementById('geo-status').innerText = "Global Mode Active";
        }
        calculate();
    }

    function formatMoney(amount, currencyCode) {
        if (!isFinite(amount) || isNaN(amount)) return "-";
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyCode }).format(amount);
    }

    // Number counting animation logic
    function animateValue(objId, start, end, duration, formatFn, currencyCode) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            // Ease out function for smoother stop
            const easeOutQuart = 1 - Math.pow(1 - progress, 4);
            const currentVal = progress * (end - start) + start;
            
            document.getElementById(objId).innerText = formatFn ? formatFn(currentVal, currencyCode) : currentVal.toFixed(2) + "%";
            
            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                document.getElementById(objId).innerText = formatFn ? formatFn(end, currencyCode) : end.toFixed(2) + "%";
            }
        };
        window.requestAnimationFrame(step);
    }

    // Store previous values for animation
    let prevCpm = 0, prevCpc = 0, prevRoas = 0;

    function calculate() {
        const spend = parseFloat(document.getElementById('spend').value) || 0;
        const impressions = parseFloat(document.getElementById('impressions').value) || 0;
        const clicks = parseFloat(document.getElementById('clicks').value) || 0;
        const revenue = parseFloat(document.getElementById('revenue').value) || 0;
        const currency = document.getElementById('currency').value;

        let cpm = (spend / impressions) * 1000;
        let cpc = (spend / clicks);
        let roas = (revenue / spend) * 100;

        // Animate the numbers instead of just replacing them
        if(isFinite(cpm)) { animateValue("res-cpm", prevCpm, cpm, 800, formatMoney, currency); prevCpm = cpm; }
        if(isFinite(cpc)) { animateValue("res-cpc", prevCpc, cpc, 800, formatMoney, currency); prevCpc = cpc; }
        
        if(isFinite(roas)) {
            const roasElement = document.getElementById('res-roas');
            roasElement.innerText = roas.toFixed(0) + "% ROI";
            // Change color based on profit
            if(roas < 100) roasElement.style.color = "#ef4444"; // Red if losing money
            else roasElement.style.color = "#34d399"; // Green if making money
        }
    }

    window.onload = autoDetectCurrency;
</script>

</body>
</html>
