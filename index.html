<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Ad Calculator | CPM, CPC & ROAS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 30px; }
        h2 { width: 100%; text-align: center; color: #2c3e50; }
        .input-section, .result-section { flex: 1; min-width: 300px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .result-card { background: #eef2f3; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; border-left: 5px solid #3498db; }
        .result-title { font-size: 12px; text-transform: uppercase; color: #7f8c8d; font-weight: bold; }
        .result-value { font-size: 24px; font-weight: bold; color: #2980b9; margin-top: 5px; }
        .roas-card { border-left-color: #27ae60; background: #eafaf1; }
        .roas-card .result-value { color: #27ae60; }
        .loading-text { font-size: 12px; color: #e67e22; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Advanced Ad Campaign Calculator</h2>

    <div class="input-section">
        <div class="form-group">
            <label>Currency (Auto-detected)</label>
            <select id="currency" onchange="calculate()">
                <option value="USD">USD ($)</option>
                <option value="LKR">LKR (Rs)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
                <option value="INR">INR (₹)</option>
            </select>
            <div id="loading" class="loading-text">Detecting your country...</div>
        </div>
        <div class="form-group">
            <label>Total Ad Spend / Cost</label>
            <input type="number" id="spend" value="1000" oninput="calculate()">
        </div>
        <div class="form-group">
            <label>Total Impressions</label>
            <input type="number" id="impressions" value="250000" oninput="calculate()">
        </div>
        <div class="form-group">
            <label>Total Clicks</label>
            <input type="number" id="clicks" value="5000" oninput="calculate()">
        </div>
        <div class="form-group">
            <label>Total Revenue Generated</label>
            <input type="number" id="revenue" value="4500" oninput="calculate()">
        </div>
    </div>

    <div class="result-section">
        <div class="result-card">
            <div class="result-title">CPM (Cost Per 1000 Impressions)</div>
            <div class="result-value" id="res-cpm">-</div>
        </div>
        <div class="result-card">
            <div class="result-title">CPC (Cost Per Click)</div>
            <div class="result-value" id="res-cpc">-</div>
        </div>
        <div class="result-card">
            <div class="result-title">CTR (Click-Through Rate)</div>
            <div class="result-value" id="res-ctr">-</div>
        </div>
        <div class="result-card roas-card">
            <div class="result-title">ROAS (Return on Ad Spend)</div>
            <div class="result-value" id="res-roas">-</div>
        </div>
    </div>
</div>

<script>
    // 1. IP API eken rata hoyala Currency eka auto set karana function eka
    async function autoDetectCurrency() {
        document.getElementById('loading').style.display = 'block';
        try {
            // Free IP Geolocation API ekak use karanawa
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            
            // API eken currency code eka enawanam, eka drop-down ekata set karanawa
            if(data.currency) {
                const currencySelect = document.getElementById('currency');
                // Option eka list eke thiyenawada balala select karanawa
                for(let i=0; i < currencySelect.options.length; i++) {
                    if(currencySelect.options[i].value === data.currency) {
                        currencySelect.selectedIndex = i;
                        break;
                    }
                }
            }
        } catch (error) {
            console.log("Adblocker ekak nisa hari net awulak nisa hari auto-detect fail una. Default eka USD.");
        }
        document.getElementById('loading').style.display = 'none';
        calculate(); // Currency eka awata passe calculations run karanawa
    }

    // 2. Mudal format karana function eka (Udaharanayak: 1000 -> $1,000.00)
    function formatMoney(amount, currencyCode) {
        if (!isFinite(amount) || isNaN(amount)) return "-";
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyCode }).format(amount);
    }

    // 3. Main math logic eka
    function calculate() {
        // Values gannawa
        const spend = parseFloat(document.getElementById('spend').value) || 0;
        const impressions = parseFloat(document.getElementById('impressions').value) || 0;
        const clicks = parseFloat(document.getElementById('clicks').value) || 0;
        const revenue = parseFloat(document.getElementById('revenue').value) || 0;
        const currency = document.getElementById('currency').value;

        // Math Formulas
        let cpm = (spend / impressions) * 1000;
        let cpc = (spend / clicks);
        let ctr = (clicks / impressions) * 100;
        let roas = (revenue / spend) * 100;

        // UI eka update karanawa
        document.getElementById('res-cpm').innerText = formatMoney(cpm, currency);
        document.getElementById('res-cpc').innerText = formatMoney(cpc, currency);
        document.getElementById('res-ctr').innerText = isFinite(ctr) ? ctr.toFixed(2) + "%" : "-";
        
        // ROAS eka format kireema
        if(isFinite(roas)) {
            document.getElementById('res-roas').innerText = roas.toFixed(0) + "% (" + formatMoney(revenue - spend, currency) + " Profit)";
        } else {
            document.getElementById('res-roas').innerText = "-";
        }
    }

    // Page eka load weddi mulinma auto-detect function eka run karanawa
    window.onload = autoDetectCurrency;
</script>

</body>
</html>
